<!DOCTYPE html>
<html lang="zh-CN" style="color-scheme: dark;">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>细粒度情绪识别系统</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Minimalist Dark Theme */
            --bg-primary: #000000;
            --bg-secondary: #0a0a0a;
            --bg-card: #111111;
            --bg-input: #1a1a1a;

            --accent: #ffffff;
            --accent-hover: #e0e0e0;
            --accent-glow: rgba(255, 255, 255, 0.15);

            --text-primary: #f5f5f5;
            --text-secondary: #a3a3a3;
            --text-muted: #737373;

            --border: #262626;
            --border-hover: #404040;

            --success: #22c55e;
            --warning: #eab308;
            --error: #ef4444;

            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 14px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 3rem 1.5rem;
            position: relative;
            z-index: 1;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 3.5rem;
            animation: fadeIn 0.6s ease-out forwards;
        }

        .header h1 {
            font-size: 2.25rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.75rem;
            letter-spacing: -0.02em;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 1rem;
            font-weight: 400;
            max-width: 500px;
            margin: 0 auto;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 500;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-secondary);
            border: 1px solid var(--border);
            margin-top: 1.25rem;
            letter-spacing: 0.01em;
        }

        /* Card Layout */
        .card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 2.5rem;
            margin-bottom: 2rem;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.2);
            animation: slideUp 0.5s ease-out forwards;
            opacity: 0;
        }

        /* Staggered animation delays */
        .card:nth-child(1) {
            animation-delay: 0.1s;
        }

        .card:nth-child(2) {
            animation-delay: 0.2s;
        }

        .card:nth-child(3) {
            animation-delay: 0.3s;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(16px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card-title {
            font-size: 1.125rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            letter-spacing: -0.01em;
        }

        .card-title .icon {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        /* Input Controls */
        .input-group {
            margin-bottom: 1.5rem;
        }

        .input-group label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 0.6rem;
        }

        textarea,
        input[type="text"] {
            width: 100%;
            padding: 0.875rem 1rem;
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
            background: var(--bg-input);
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.9375rem;
            transition: all 0.2s ease;
            outline: none;
            resize: vertical;
        }

        textarea:hover,
        input[type="text"]:hover {
            border-color: var(--border-hover);
        }

        textarea:focus-visible,
        input[type="text"]:focus-visible {
            border-color: var(--accent);
            background: var(--bg-card);
            box-shadow: 0 0 0 1px var(--accent);
        }

        textarea::placeholder,
        input::placeholder {
            color: var(--text-muted);
        }

        #targetText {
            min-height: 120px;
        }

        /* Dialogue History */
        .history-container {
            margin-bottom: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }

        .history-title {
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .history-title-hint {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 400;
        }

        .history-items {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }

        .history-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            animation: fadeIn 0.3s ease;
        }

        .history-item input {
            flex: 1;
            padding: 0.75rem 1rem;
        }

        .history-item label.turn-label {
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text-secondary);
            min-width: 48px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .btn-remove {
            width: 36px;
            height: 36px;
            flex-shrink: 0;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            font-size: 1.2rem;
            line-height: 1;
        }

        .btn-remove:hover {
            color: var(--error);
            border-color: rgba(239, 68, 68, 0.3);
            background: rgba(239, 68, 68, 0.05);
        }

        .btn-add {
            padding: 0.6rem 1rem;
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.875rem;
            font-weight: 500;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-add:hover {
            color: var(--text-primary);
            border-color: var(--text-secondary);
            background: rgba(255, 255, 255, 0.03);
        }

        /* Action Button */
        .btn-predict {
            width: 100%;
            padding: 1rem;
            border-radius: var(--radius-md);
            border: 1px solid transparent;
            background: var(--accent);
            color: var(--bg-primary);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 1rem;
        }

        .btn-predict:hover:not(:disabled) {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }

        .btn-predict:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-predict:focus-visible {
            outline: none;
            box-shadow: 0 0 0 2px var(--bg-primary), 0 0 0 4px var(--accent);
        }

        .btn-predict:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(0, 0, 0, 0.1);
            border-top: 2px solid var(--bg-primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 0.5rem;
        }

        .btn-predict.loading .spinner {
            display: block;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Results Area */
        .result-card {
            display: none;
        }

        .result-card.visible {
            display: block;
            animation: slideUp 0.4s ease forwards;
        }

        .emotion-display {
            text-align: center;
            padding: 2.5rem 1.5rem;
            margin-bottom: 1.5rem;
            border-radius: var(--radius-md);
            background: var(--bg-input);
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }

        /* Subtle glow for emotion result */
        .emotion-display::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
        }

        .emotion-label {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .emotion-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--text-primary);
            text-transform: capitalize;
            letter-spacing: -0.02em;
        }

        /* Removed detail grid CSS */

        /* Examples Chips */
        .examples-section {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px dashed var(--border);
        }

        .examples-label {
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .examples {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .example-chip {
            padding: 0.4rem 0.8rem;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--bg-secondary);
            color: var(--text-secondary);
            font-size: 0.8125rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.35rem;
        }

        .example-chip:hover {
            color: var(--text-primary);
            border-color: var(--text-secondary);
            background: var(--bg-input);
        }

        /* Error Message */
        .error-msg {
            display: none;
            padding: 1rem;
            border-radius: var(--radius-md);
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: var(--error);
            font-size: 0.875rem;
            margin-bottom: 1.5rem;
            font-weight: 500;
        }

        .error-msg.visible {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        /* History Log */
        .log-entry {
            padding: 1rem;
            border-radius: var(--radius-md);
            background: var(--bg-input);
            border: 1px solid var(--border);
            margin-bottom: 0.75rem;
            font-size: 0.875rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: fadeIn 0.3s ease;
        }

        .log-entry .log-text {
            color: var(--text-secondary);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            margin-right: 1.5rem;
        }

        .log-entry .log-emotion {
            font-weight: 600;
            color: var(--text-primary);
            padding: 0.2rem 0.6rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 2rem 0;
            color: var(--text-muted);
            font-size: 0.8125rem;
        }

        /* Responsive */
        @media (max-width: 640px) {
            .container {
                padding: 2rem 1rem;
            }

            .header {
                margin-bottom: 2rem;
            }

            .card {
                padding: 1.5rem;
            }

            .result-details {
                grid-template-columns: 1fr;
            }
        }

        /* Focus styles for accessibility */
        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>细粒度情绪识别系统</h1>
            <p>基于 Qwen2.5-7B + LoRA 的 28 类情感分析</p>
            <span class="badge">Model: fQwQf/erc-qwen2.5-7b-sota</span>
        </header>

        <!-- Input Card -->
        <main>
            <section class="card" aria-label="分析工具">
                <h2 class="card-title">
                    <svg class="icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                    </svg>
                    输入待分析文本
                </h2>

                <!-- Target text -->
                <div class="input-group">
                    <label for="targetText">目标发言</label>
                    <textarea id="targetText" autocomplete="off" spellcheck="true"
                        placeholder="输入要分析情感的文本，例如：我今天终于通过了驾照考试！太开心了！…"></textarea>
                </div>

                <!-- Dialogue history -->
                <div class="history-container">
                    <div class="history-header">
                        <div class="history-title">
                            对话历史
                            <span class="history-title-hint">(可选，提高识别准确度)</span>
                        </div>
                        <button class="btn-add" type="button" aria-label="添加一轮对话历史" onclick="addHistoryTurn()">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <path d="M12 5v14M5 12h14" />
                            </svg>
                            添加一轮对话
                        </button>
                    </div>
                    <div class="history-items" id="historyItems"></div>
                </div>

                <!-- Error -->
                <div class="error-msg" id="errorMsg" aria-live="polite"></div>

                <!-- Predict button -->
                <button class="btn-predict" id="predictBtn" onclick="predict()" aria-label="分析情感">
                    <span class="spinner" aria-hidden="true"></span>
                    <span class="btn-text">分析情感</span>
                </button>

                <!-- Quick examples -->
                <div class="examples-section">
                    <div class="examples-label">快速示例</div>
                    <div class="examples" role="group" aria-label="快速示例选项">
                        <button class="example-chip" type="button"
                            onclick="fillExample('I just got promoted at work! This is amazing!')">升职</button>
                        <button class="example-chip" type="button"
                            onclick="fillExample('I lost my wallet on the bus today…')">丢钱包</button>
                        <button class="example-chip" type="button"
                            onclick="fillExample('There was a huge spider on my desk!')">蜘蛛</button>
                        <button class="example-chip" type="button"
                            onclick="fillExample('My best friend lied to me about something important.')">被欺骗</button>
                        <button class="example-chip" type="button"
                            onclick="fillExample('I\'m not sure if I should accept this job offer or stay.')">纠结</button>
                        <button class="example-chip" type="button" onclick="fillExampleWithHistory()">带历史</button>
                    </div>
                </div>
            </section>

            <!-- Result Card -->
            <section class="card result-card" id="resultCard" aria-live="polite">
                <h2 class="card-title">
                    <svg class="icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 20v-6M6 20V10M18 20V4"></path>
                    </svg>
                    分析结果
                </h2>

                <div class="emotion-display">
                    <div class="emotion-label">识别的情感</div>
                    <div class="emotion-value" id="emotionResult">—</div>
                </div>

                <!-- Details removed -->
            </section>

            <!-- Prediction Log -->
            <section class="card" id="logCard" style="display:none">
                <h2 class="card-title">
                    <svg class="icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="16" y1="13" x2="8" y2="13"></line>
                        <line x1="16" y1="17" x2="8" y2="17"></line>
                        <polyline points="10 9 9 9 8 9"></polyline>
                    </svg>
                    历史记录
                </h2>
                <div class="chat-log" id="chatLog"></div>
            </section>
        </main>

        <footer class="footer">
            Powered by ERC · EmotionAI-2026-WHU
        </footer>
    </div>

    <script>
        const API_BASE = window.location.origin;

        function addHistoryTurn(value = '') {
            const container = document.getElementById('historyItems');
            const idx = container.children.length + 1;
            const div = document.createElement('div');
            div.className = 'history-item';
            div.innerHTML = `
                <label for="historyInput-${idx}" class="turn-label">Turn ${idx}</label>
                <input id="historyInput-${idx}" type="text" class="history-input" autocomplete="off" placeholder="第 ${idx} 轮对话内容…" value="${value}">
                <button class="btn-remove" type="button" aria-label="删除第 ${idx} 轮对话" onclick="this.parentElement.remove(); reindexHistory()">×</button>
            `;
            container.appendChild(div);
        }

        function reindexHistory() {
            const items = document.querySelectorAll('.history-item');
            items.forEach((item, i) => {
                const newIdx = i + 1;
                const label = item.querySelector('.turn-label');
                const input = item.querySelector('input');
                const btn = item.querySelector('button');

                label.textContent = `Turn ${newIdx}`;
                label.setAttribute('for', `historyInput-${newIdx}`);
                input.id = `historyInput-${newIdx}`;
                input.placeholder = `第 ${newIdx} 轮对话内容…`;
                btn.setAttribute('aria-label', `删除第 ${newIdx} 轮对话`);
            });
        }

        function fillExample(text) {
            document.getElementById('targetText').value = text;
            document.getElementById('historyItems').innerHTML = '';
        }

        function fillExampleWithHistory() {
            document.getElementById('targetText').value = "That really scared me when it happened…";
            document.getElementById('historyItems').innerHTML = '';
            addHistoryTurn("We went hiking in the mountains last weekend.");
            addHistoryTurn("Suddenly a thunderstorm hit and lightning struck nearby!");
        }

        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = msg;
            el.classList.add('visible');
            setTimeout(() => el.classList.remove('visible'), 5000);
        }

        async function predict() {
            const text = document.getElementById('targetText').value.trim();
            if (!text) {
                showError('请输入要分析的文本');
                return;
            }

            const historyInputs = document.querySelectorAll('.history-input');
            const history = [];
            historyInputs.forEach(input => {
                if (input.value.trim()) history.push(input.value.trim());
            });

            const btn = document.getElementById('predictBtn');
            btn.classList.add('loading');
            btn.disabled = true;
            btn.querySelector('.btn-text').textContent = '分析中…';

            try {
                const resp = await fetch(`${API_BASE}/predict`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text, history }),
                });

                if (!resp.ok) {
                    throw new Error(`HTTP ${resp.status}: ${resp.statusText}`);
                }

                const data = await resp.json();

                // Show result
                document.getElementById('emotionResult').textContent = data.emotion || 'unknown';
                document.getElementById('resultCard').classList.add('visible');

                // Add to log
                addToLog(text, data.emotion);

            } catch (err) {
                showError(`请求失败: ${err.message}`);
            } finally {
                btn.classList.remove('loading');
                btn.disabled = false;
                btn.querySelector('.btn-text').textContent = '分析情感';
            }
        }

        function addToLog(text, emotion) {
            const logCard = document.getElementById('logCard');
            const logContainer = document.getElementById('chatLog');
            logCard.style.display = 'block';

            const entry = document.createElement('div');
            entry.className = 'log-entry';
            // Vercel guidelines: … over ...
            const displayText = text.length > 60 ? text.substring(0, 60) + '…' : text;
            entry.innerHTML = `
                <span class="log-text">${displayText}</span>
                <span class="log-emotion">${emotion}</span>
            `;
            logContainer.prepend(entry);
        }

        // Enter key to predict
        document.getElementById('targetText').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && e.ctrlKey) {
                predict();
            }
        });
    </script>
</body>

</html>
